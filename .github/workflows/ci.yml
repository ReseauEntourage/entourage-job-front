name: Entourage Pro - Front CI

on:
  push:
    branches: [master, develop]
  pull_request: {}
  workflow_dispatch:

env:
  PORT: 3000
  NEXT_PUBLIC_TOOLBOX_COACH_URL: 'https://google.com'
  NEXT_PUBLIC_TOOLBOX_CANDIDATE_URL: 'https://google.com'
  NEXT_PUBLIC_TOOLBOX_COMPANY_URL: 'https://google.com'
  NEXT_PUBLIC_DONATION_LINK: 'https://google.com'
  NEXT_PUBLIC_SERVER_URL: 'http://localhost:3000'
  NEXT_PUBLIC_API_URL: 'http://localhost:3002'
  NEXT_PUBLIC_AWSS3_URL: https://entourage-job-preprod.s3.amazonaws.com
  NEXT_PUBLIC_AWSS3_CDN_URL: https://d3s4t580ymtqme.cloudfront.net
  NEXT_PUBLIC_CDN_URL: https://d280vsj7wg1qqw.cloudfront.net
  NEXT_PUBLIC_AWSS3_IMAGE_DIRECTORY: /images/
  CYPRESS_IO_PROJECT_ID: ${{ secrets.CYPRESS_IO_PROJECT_ID }}
  NEXT_PUBLIC_PUSHER_API_KEY: ${{ secrets.PUSHER_API_KEY }}
  NEXT_PUBLIC_LOCAL_BRANCH_ADDRESS_PARIS: '174 Rue Championnet 75018, Paris'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

  ts-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm run test:ts-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm run test:eslint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm run test:integ

  e2e:
    name: E2E on Chrome
    runs-on: ubuntu-latest
    needs: [ts-check, lint, build, test]
    environment: 'entourage-job-front'
    container:
      image: cypress/browsers:node-20.18.0-chrome-130.0.6723.69-1-ff-131.0.3-edge-130.0.2849.52-1
      options: --user 1001
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          install-cypress: 'true'
      - name: Run Cypress - End to End Test
        uses: cypress-io/github-action@v7
        with:
          start: pnpm run dev
          config: baseUrl=http://localhost:3000
          browser: chrome
          wait-on: http://localhost:3000
          record: true
        env:
          CYPRESS_PROJECT_ID: ${{ secrets.CYPRESS_IO_PROJECT_ID }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_IO_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
